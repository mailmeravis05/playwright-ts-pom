version: '3.8'

services:
  playwright:
    build: .
    container_name: pw-tests

    volumes:
      - .:/app
      - ./downloads:/app/downloads
      - ./playwright-report:/app/playwright-report

    environment:
      - BASE_URL=https://www.originenergy.com.au

    command: npx playwright test --reporter=html

    shm_size: "2gb"